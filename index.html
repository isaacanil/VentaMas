<!doctype html>

<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ventamax.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VENTAMAX</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module">
      import {
        getReactScanDevToolsConflictMessage,
        isReactDevToolsDetected,
        shouldAutoLoadReactScan,
      } from '/src/utils/reactScan.ts';

      const startApp = async () => {
        // Probe de emuladores antes de iniciar la app
        if (import.meta.env.DEV) {
          const host =
            import.meta.env.VITE_FIREBASE_EMULATOR_HOST || '127.0.0.1';
          const port = import.meta.env.VITE_FIRESTORE_EMULATOR_PORT || 8081;

          try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 120);
            // Intentamos un fetch simple al puerto de Firestore
            await fetch(`http://${host}:${port}`, {
              mode: 'no-cors',
              signal: controller.signal,
            });
            clearTimeout(id);
            window.__EMULATORS_ALIVE__ = true;
          } catch (e) {
            console.warn(
              '[Emulator Probe] No se detectan emuladores en ejecución. Usando Firebase Real.',
            );
            window.__EMULATORS_ALIVE__ = false;
          }
        }
        return import('/src/main.tsx');
      };

      const reactScanRequested =
        import.meta.env.DEV &&
        import.meta.env.VITE_ENABLE_REACT_SCAN === 'true';

      if (shouldAutoLoadReactScan(import.meta.env, window)) {
        const script = document.createElement('script');
        script.crossOrigin = 'anonymous';
        script.src = 'https://unpkg.com/react-scan/dist/auto.global.js';
        script.onload = () => {
          startApp();
        };
        script.onerror = () => {
          startApp();
        };
        document.head.appendChild(script);
      } else {
        if (reactScanRequested && isReactDevToolsDetected(window)) {
          console.warn(getReactScanDevToolsConflictMessage());
        }
        startApp();
      }
    </script>
  </body>
</html>
